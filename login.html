<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodFlix - Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <h1>MoodFlix</h1>
            </div>
        </nav>
    </header>

    <section id="login-section">
        <h2>Login to MoodFlix</h2>

        <!-- Email/Password Login Form -->
        <div id="emailPasswordLogin">
            <h3>Sign in with Email</h3>
            <form id="loginForm">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Sign In</button>
            </form>
            <p>Don't have an account? <a href="#" id="signUpLink">Sign Up</a></p>
        </div>

        <!-- Google Sign-In Button -->
        <div id="googleSignIn">
    <h3>Or</h3>
    <button id="googleLoginBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google logo">
        Sign in with Google
    </button>
</div>

    </section>

    <!-- Firebase and JavaScript -->
    <script type="module">
        // Import Firebase SDK
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyC7s1KaS0e27dbSJuBZ-6HEa5aDAf9o1Xs",
            authDomain: "moodflix-8d7dd.firebaseapp.com",
            projectId: "moodflix-8d7dd",
            storageBucket: "moodflix-8d7dd.appspot.com",
            messagingSenderId: "85274276522",
            appId: "1:85274276522:web:6126c743e99b27915796d3",
            measurementId: "G-04GLZ1N633"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Email/Password Sign-In
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    // Signed in
                    const user = userCredential.user;
                    console.log(`User ${user.email} logged in with email/password.`);
                    window.location.href = "index.html"; // Redirect to home page
                })
                .catch((error) => {
                    console.error('Error during email/password login:', error.message);
                    alert('Error: ' + error.message);
                });
        });

        // Google Sign-In
        document.getElementById('googleLoginBtn').addEventListener('click', () => {
            signInWithPopup(auth, provider)
                .then((result) => {
                    console.log(`User ${result.user.displayName} logged in with Google.`);
                    window.location.href = "index.html"; // Redirect to home page
                })
                .catch((error) => {
                    console.error('Error during Google login:', error.message);
                    alert('Error: ' + error.message);
                });
        });

        // Sign Up
        document.getElementById('signUpLink').addEventListener('click', (e) => {
            e.preventDefault();
            const email = prompt('Enter your email:');
            const password = prompt('Enter a password:');

            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    // User signed up
                    const user = userCredential.user;
                    console.log(`User ${user.email} signed up with email/password.`);
                    window.location.href = "index.html"; // Redirect to home page
                })
                .catch((error) => {
                    console.error('Error during sign-up:', error.message);
                    alert('Error: ' + error.message);
                });
        });
    </script>
</body>
</html>
