<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Movie</title>
    <style>
        /* Add your styles here */
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .movie-player {
            width: 100%;
            height: 500px;
            background-color: #000;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1 id="movie-title">Loading...</h1>
    <div class="movie-player">
        <!-- Your movie player iframe or video element goes here -->
        <p>Movie player will be here...</p>
    </div>

    <script>
        // Capture the movie title from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const movieTitle = urlParams.get('movie');

        // Set the movie title in the page
        document.getElementById('movie-title').textContent = decodeURIComponent(movieTitle);

        // You would load the actual movie player here using movieTitle or another identifier
    </script>
</body>
</html>
